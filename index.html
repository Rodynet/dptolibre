<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLINDATO | Real Estate OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .score-badge { transition: transform 0.2s; }
        .score-badge:hover { transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-slate-900 uppercase italic">Blindato</h1>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em]">
                    Real Estate OS | <span class="text-emerald-600">Infoexperto Engine v1.1</span>
                </p>
            </div>
            <div class="flex gap-3">
                <div class="bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm text-[10px] font-black uppercase">
                    UVC Meta: 3.3
                </div>
                <button class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase shadow-xl hover:bg-slate-800 transition-all active:scale-95">
                    Nuevo Legajo
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Propiedad / Dueño</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Score IX</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado Operativo</th>
                            <th class="p-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="p-5">
                                <div class="font-bold text-slate-800 text-sm">Av. Colón 1200</div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase">Martínez Rodrigo</div>
                            </td>
                            <td class="p-5 text-center">
                                <span class="score-badge inline-block bg-emerald-50 text-emerald-600 font-black px-3 py-1 rounded-lg border border-emerald-100 shadow-sm">
                                    84
                                </span>
                            </td>
                            <td class="p-5">
                                <span class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-full text-[9px] font-black uppercase border border-indigo-100 tracking-tighter">
                                    En Firma Digital
                                </span>
                            </td>
                            <td class="p-5 text-right">
                                <button class="p-2 hover:bg-white hover:shadow-md rounded-full transition-all">
                                    <i data-lucide="external-link" class="w-4 h-4 text-slate-400"></i>
                                </button>
                            </td>
                        </tr>
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="p-5">
                                <div class="font-bold text-slate-800 text-sm">Bv. Chacabuco 450</div>
                                <div class="text-[10px] text-slate-400 font-bold uppercase">Inversiones CBA</div>
                            </td>
                            <td class="p-5 text-center">
                                <span class="score-badge inline-block bg-emerald-50 text-emerald-600 font-black px-3 py-1 rounded-lg border border-emerald-100 shadow-sm">
                                    92
                                </span>
                            </td>
                            <td class="p-5">
                                <span class="bg-amber-50 text-amber-600 px-3 py-1.5 rounded-full text-[9px] font-black uppercase border border-amber-100 tracking-tighter">
                                    Validando Legajo
                                </span>
                            </td>
                            <td class="p-5 text-right">
                                <button class="p-2 hover:bg-white hover:shadow-md rounded-full transition-all text-slate-400">
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-8 flex justify-between items-center px-4">
            <div class="flex items-center gap-2 text-slate-400">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest tracking-tighter">Sistema Blindado & Protegido</span>
            </div>
            <div class="text-[9px] font-bold text-slate-300 uppercase">Score RM: 95% Accierto</div>
        </div>
    </div>

    <script>
        // Inicialización de iconos con Lucide
        lucide.createIcons();
    </script>
</body>
</html>
