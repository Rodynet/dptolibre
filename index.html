<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blindato OS - La Secretaría Digital del Alquiler</title>
    <!-- Tailwind CSS para Estética Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --dark: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* Estilo de Dispositivo Móvil (Contenedor) */
        .mobile-shell {
            width: 100%;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        /* Ocultar scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animaciones de Transición */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Cristalomorfismo */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .shadow-premium {
            box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTE ICONO (LUCIDE) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- APLICACIÓN PRINCIPAL ---
        function BlindatoApp() {
            // Estados Globales
            const [authState, setAuthState] = useState('landing'); // 'landing', 'login', 'register', 'auth_success'
            const [profile, setProfile] = useState('tenant'); // 'admin', 'tenant', 'owner'
            const [view, setView] = useState('home');
            const [overlay, setOverlay] = useState(null); 
            const [step, setStep] = useState(1);

            // Datos de Simulación
            const [userData, setUserData] = useState({
                name: "Marcos Galperin",
                score: 875,
                miles: 12400,
                bankBalance: 520000,
                blindedBalance: 450000,
                nextRent: 450000,
                address: "Caseros 1230, 4B",
                health: 94.2,
                fees: 840500,
                totalEscrow: 12540800
            });

            // --- NAVEGACIÓN Y ACCIONES ---
            const handleProfileSwitch = (p) => {
                setProfile(p);
                setView('home');
                setOverlay(null);
            };

            // --- VISTAS DE AUTENTICACIÓN ---
            const Landing = () => (
                <div className="h-full flex flex-col bg-slate-900 text-white p-10 justify-center items-center text-center fade-in">
                    <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-2xl shadow-indigo-500/40">
                        <Icon name="shield-check" size={40} />
                    </div>
                    <h1 className="text-4xl font-black tracking-tighter mb-4 leading-none">BLINDATO</h1>
                    <p className="text-slate-400 text-sm font-medium mb-12 leading-relaxed">
                        El Airbnb del largo plazo. <br/> Gestión de alquileres con fricción cero y blindaje financiero.
                    </p>
                    <div className="w-full space-y-4">
                        <button onClick={() => setAuthState('register')} className="w-full bg-white text-slate-900 py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-xl">Comenzar Ahora</button>
                        <button onClick={() => setAuthState('login')} className="w-full bg-slate-800 text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest">Ya tengo cuenta</button>
                    </div>
                </div>
            );

            const AuthForm = ({ mode }) => (
                <div className="h-full flex flex-col p-10 justify-center bg-white fade-in">
                    <header className="mb-10">
                        <h2 className="text-3xl font-black text-slate-900 tracking-tight">{mode === 'login' ? 'Bienvenido de nuevo' : 'Crea tu Pasaporte'}</h2>
                        <p className="text-slate-400 text-sm font-medium">Accede a tu cuenta de Blindato.</p>
                    </header>
                    <div className="space-y-6 flex-1">
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Email / DNI</label>
                            <input type="text" placeholder="ej: marcos@galperin.com" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-600 outline-none" />
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Contraseña</label>
                            <input type="password" placeholder="••••••••" className="w-full bg-slate-50 border-none p-5 rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-600 outline-none" />
                        </div>
                    </div>
                    <button onClick={() => setAuthState('auth_success')} className="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100">
                        {mode === 'login' ? 'Entrar' : 'Registrarme'}
                    </button>
                    <button onClick={() => setAuthState('landing')} className="mt-6 text-slate-400 font-bold text-xs uppercase tracking-widest">Volver</button>
                </div>
            );

            // --- VISTA ADMINISTRADOR (ESTILO WEB TORRE DE CONTROL) ---
            const AdminView = () => (
                <div className="h-full flex flex-col bg-slate-50 fade-in">
                    <header className="p-8 bg-white border-b flex justify-between items-end shadow-sm">
                        <div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tighter uppercase leading-none">Torre de Control</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Visión General del Negocio</p>
                        </div>
                        <div className="flex gap-2">
                            <button className="p-3 bg-slate-100 rounded-2xl text-slate-400"><Icon name="search" size={20}/></button>
                            <button className="p-3 bg-indigo-600 rounded-2xl text-white shadow-lg"><Icon name="plus" size={20}/></button>
                        </div>
                    </header>
                    <main className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar">
                        {/* KPIs */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm flex flex-col items-center text-center">
                                <div className="w-16 h-16 rounded-full border-4 border-emerald-500 flex items-center justify-center text-emerald-600 font-black text-lg mb-2">94%</div>
                                <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest">Salud Cartera</span>
                            </div>
                            <div className="bg-slate-900 p-6 rounded-[2.5rem] shadow-xl text-white">
                                <p className="text-[8px] font-black uppercase opacity-50 tracking-widest mb-2">Honorarios</p>
                                <h3 className="text-xl font-black">$840.5k</h3>
                                <button className="text-[8px] font-black bg-white/10 text-white py-1.5 px-3 rounded-lg uppercase mt-4">Retirar</button>
                            </div>
                        </div>

                        {/* Valla de Atención (El Juez) */}
                        <section className="space-y-4">
                            <div className="flex justify-between items-center px-2">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Veredictos Pendientes</h4>
                                <span className="bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full text-[8px] font-black uppercase">3 Alertas</span>
                            </div>
                            
                            <div onClick={() => setOverlay('ai_verdict')} className="bg-white p-6 rounded-[2rem] border-l-[12px] border-emerald-500 shadow-premium flex flex-col gap-4">
                                <div className="flex gap-4">
                                    <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center shrink-0"><Icon name="zap"/></div>
                                    <div>
                                        <h4 className="font-black text-sm text-slate-800">Legajo: Juan Pérez</h4>
                                        <p className="text-[10px] text-slate-500 font-medium">IA detectó solvencia 3.2x. Sugerencia de cierre inmediato.</p>
                                    </div>
                                </div>
                                <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Ver Análisis IA</button>
                            </div>

                            <div className="bg-white p-6 rounded-[2rem] border-l-[12px] border-amber-500 shadow-sm flex flex-col gap-4 opacity-80">
                                <div className="flex gap-4">
                                    <div className="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center shrink-0"><Icon name="clock"/></div>
                                    <div>
                                        <h4 className="font-black text-sm text-slate-800">Aviso Dueño Pendiente</h4>
                                        <p className="text-[10px] text-slate-500 font-medium">Contrato #8890 sin firma de Propietario hace 48hs.</p>
                                    </div>
                                </div>
                                <button className="w-full bg-amber-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Push Recordatorio</button>
                            </div>
                        </section>
                    </main>
                </div>
            );

            // --- VISTA INQUILINO (APP MOBILE) ---
            const TenantView = () => (
                <div className="h-full flex flex-col bg-white fade-in">
                    <header className="px-8 pt-12 pb-6 flex justify-between items-center border-b border-slate-50 z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-100 rounded-full border-2 border-indigo-600 overflow-hidden shadow-sm">
                                <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=Juan`} alt="Avatar" />
                            </div>
                            <div>
                                <p className="text-sm font-black text-slate-900 leading-none">{userData.name}</p>
                                <p className="text-[10px] font-black text-indigo-600 uppercase mt-1 tracking-tighter">Inquilino Platinum</p>
                            </div>
                        </div>
                        <Icon name="bell" size={20} className="text-slate-400" />
                    </header>

                    <main className="flex-1 overflow-y-auto px-6 py-6 space-y-6 no-scrollbar pb-32">
                        {/* Score & Miles */}
                        <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex justify-around items-center">
                            <div className="text-center">
                                <span className="text-2xl font-black text-slate-800">{userData.score}</span>
                                <span className="text-[8px] font-black text-slate-400 uppercase block tracking-widest mt-1">Rental Score</span>
                            </div>
                            <div className="w-[1px] h-10 bg-slate-200"></div>
                            <div className="text-center">
                                <span className="text-2xl font-black text-slate-800">{userData.miles.toLocaleString()}</span>
                                <span className="text-[8px] font-black text-slate-400 uppercase block tracking-widest mt-1">Millas</span>
                            </div>
                        </div>

                        {/* Billetera de Blindaje */}
                        <div onClick={() => setOverlay('blinding_wizard')} className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden active:scale-95 transition-transform">
                            <Icon name="shield-check" size={140} className="absolute right-[-30px] bottom-[-30px] text-white/5" />
                            <p className="text-[10px] font-black uppercase text-indigo-400 tracking-widest mb-1">Misión: Blindar Próximo Mes</p>
                            <h3 className="text-3xl font-black mb-6">$450.000</h3>
                            <div className="flex justify-between text-[10px] font-black uppercase mb-2 opacity-60">
                                <span>Resguardo Actual</span>
                                <span>45%</span>
                            </div>
                            <div className="h-3 bg-white/20 rounded-full overflow-hidden mb-8">
                                <div className="h-full bg-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.5)]" style={{ width: '45%' }}></div>
                            </div>
                            <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                                <Icon name="zap" size={14} /> BLINDAR AHORA
                            </button>
                        </div>

                        {/* Estado de Alquiler */}
                        <div onClick={() => setOverlay('payment_flow')} className="bg-white p-6 rounded-[2.5rem] border shadow-premium flex flex-col gap-6">
                            <div className="flex justify-between items-start">
                                <div>
                                    <span className="text-[9px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full uppercase">Próximo: 05 Mayo</span>
                                    <h4 className="font-black text-slate-800 mt-3 text-lg">{userData.address}</h4>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200" />
                            </div>
                            <div className="flex items-center justify-between border-t pt-4">
                                <p className="text-2xl font-black text-slate-800">${userData.nextRent.toLocaleString()}</p>
                                <button className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Pagar</button>
                            </div>
                        </div>

                        {/* Bitácora / Tickets */}
                        <div className="grid grid-cols-2 gap-4">
                            <div onClick={() => setOverlay('bitacora')} className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-4">
                                <div className="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center"><Icon name="camera" size={20}/></div>
                                <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Bitácora de Estado</p>
                            </div>
                            <div onClick={() => {}} className="bg-white p-6 rounded-[2rem] border shadow-sm flex flex-col gap-4">
                                <div className="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center"><Icon name="message-circle" size={20}/></div>
                                <p className="text-[10px] font-black text-slate-800 uppercase tracking-tighter">Soporte y Tickets</p>
                            </div>
                        </div>
                    </main>

                    {/* Footer Nav */}
                    <nav className="absolute bottom-0 w-full glass border-t flex justify-around p-6 pb-10 z-[50] shadow-2xl">
                        <button className="text-indigo-600 flex flex-col items-center gap-1"><Icon name="home" size={22} strokeWidth={2.5}/><span className="text-[8px] font-black uppercase">Home</span></button>
                        <button className="text-slate-400 flex flex-col items-center gap-1"><Icon name="file-text" size={22}/><span className="text-[8px] font-black uppercase">Contratos</span></button>
                        <button className="text-slate-400 flex flex-col items-center gap-1"><Icon name="wallet" size={22}/><span className="text-[8px] font-black uppercase">Wallet</span></button>
                        <button className="text-slate-400 flex flex-col items-center gap-1"><Icon name="gift" size={22}/><span className="text-[8px] font-black uppercase">Boutique</span></button>
                    </nav>
                </div>
            );

            // --- VISTA PROPIETARIO (APP MOBILE) ---
            const OwnerView = () => (
                <div className="h-full flex flex-col bg-emerald-500 animate-fade-in">
                    <header className="p-10 pt-16 flex justify-between items-start text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-white/20 rounded-full border border-white/40 overflow-hidden shadow-xl">
                                <img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=Roberto`} alt="Owner" />
                            </div>
                            <div>
                                <p className="text-xs font-black uppercase tracking-widest">Roberto Daer</p>
                                <p className="text-[10px] font-bold text-white/60 uppercase">Dueño Platinum</p>
                            </div>
                        </div>
                        <Icon name="bell" />
                    </header>
                    <main className="flex-1 bg-white rounded-t-[3rem] p-8 space-y-10 shadow-2xl overflow-y-auto no-scrollbar">
                        <section>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Saldo Liquidado para Retiro</p>
                            <h2 className="text-5xl font-black text-slate-800 tracking-tighter">$760.400</h2>
                            <button className="mt-8 w-full bg-emerald-500 text-white font-black py-5 rounded-[2rem] text-[10px] uppercase tracking-widest shadow-xl shadow-emerald-500/20">RETIRAR A MI ALIAS</button>
                        </section>

                        <section className="space-y-4">
                            <div className="flex justify-between items-center px-1">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado de Activos</h4>
                                <Icon name="filter" size={14} className="text-slate-300" />
                            </div>
                            <div className="bg-slate-50 p-6 rounded-[2.5rem] border flex items-center justify-between hover:shadow-md transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-emerald-500 shadow-sm border border-emerald-100"><Icon name="shield-check" size={32}/></div>
                                    <div>
                                        <p className="font-black text-sm text-slate-800">{userData.address}</p>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">Inquilino: {userData.name}</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <span className="text-[8px] font-black bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full uppercase">Blindado</span>
                                    <p className="text-sm font-black text-slate-800 mt-1">$450k</p>
                                </div>
                            </div>
                        </section>

                        <div className="bg-indigo-50 p-8 rounded-[2.5rem] border border-indigo-100 relative overflow-hidden">
                            <Icon name="trending-up" size={80} className="absolute right-[-10px] top-[-10px] text-indigo-500 opacity-10" />
                            <h4 className="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">Rendimiento en Clearing</h4>
                            <p className="text-2xl font-black text-indigo-900">+$12.450</p>
                            <p className="text-[9px] text-indigo-400 font-bold uppercase mt-2">Beneficio acumulado este mes</p>
                        </div>
                    </main>
                    <nav className="absolute bottom-0 w-full glass border-t flex justify-around p-6 pb-10 z-[50]">
                        <Icon name="building-2" className="text-emerald-600" />
                        <Icon name="clock" className="text-slate-300" />
                        <Icon name="wallet" className="text-slate-300" />
                        <Icon name="settings" className="text-slate-300" />
                    </nav>
                </div>
            );

            // --- OVERLAYS Y WIZARDS ---

            const WizardOverlay = ({ children, title, onClose, dark = false }) => (
                <div className={`absolute inset-0 z-[100] flex flex-col animate-slide-up ${dark ? 'bg-slate-900 text-white' : 'bg-white text-slate-900'}`}>
                    <header className={`p-8 flex justify-between items-center ${dark ? '' : 'border-b'}`}>
                        <h3 className="text-xs font-black uppercase tracking-widest opacity-60">{title}</h3>
                        <button onClick={onClose} className={`p-2 rounded-full ${dark ? 'bg-white/10' : 'bg-slate-100'}`}><Icon name="x" size={20}/></button>
                    </header>
                    <div className="flex-1 overflow-y-auto no-scrollbar pb-20">
                        {children}
                    </div>
                </div>
            );

            // Mago de Blindaje
            const BlindingWizard = () => (
                <div className="p-8 space-y-12 flex flex-col h-full justify-center text-center animate-fade-in">
                    {step === 1 ? (
                        <>
                            <div>
                                <p className="text-indigo-400 font-black text-xs mb-4 uppercase tracking-[0.2em]">¿Cuánto quieres resguardar?</p>
                                <h2 className="text-6xl font-black">$450.000</h2>
                                <p className="text-white/40 text-xs mt-6 leading-relaxed">Resguarda tu próximo mes y empieza a <br/> acumular intereses desde hoy.</p>
                            </div>
                            <div className="bg-white/5 border border-white/10 p-8 rounded-[2rem] text-left flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-2xl flex items-center justify-center"><Icon name="landmark" /></div>
                                    <div>
                                        <p className="text-[10px] font-black text-white/50 uppercase">Origen de Fondos</p>
                                        <p className="font-bold text-sm">Banco Galicia (*** 8901)</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" className="text-white/20" />
                            </div>
                            <button onClick={() => setStep(2)} className="mt-auto w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-2xl">Ver Beneficios</button>
                        </>
                    ) : (
                        <div className="space-y-8 text-left h-full flex flex-col animate-fade-in">
                            <h3 className="text-2xl font-black text-white">Tu Potenciador</h3>
                            <div className="space-y-4 flex-1">
                                <div className="bg-white/5 border border-white/10 p-6 rounded-[2rem] flex items-center gap-4">
                                    <div className="w-12 h-12 bg-emerald-500/20 text-emerald-400 rounded-2xl flex items-center justify-center"><Icon name="trending-up" /></div>
                                    <div>
                                        <p className="text-[9px] font-black text-white/50 uppercase">Rendimiento Mensual</p>
                                        <p className="text-xl font-black text-emerald-400">+$5.430,22</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-[2rem]">
                                        <Icon name="award" className="text-indigo-400 mb-2" />
                                        <p className="text-[9px] font-black text-white/50 uppercase">Score</p>
                                        <p className="text-lg font-black">+25 pts</p>
                                    </div>
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-[2rem]">
                                        <Icon name="sparkles" className="text-amber-400 mb-2" />
                                        <p className="text-[9px] font-black text-white/50 uppercase">Millas</p>
                                        <p className="text-lg font-black">+4.500</p>
                                    </div>
                                </div>
                                <div className="bg-indigo-600/30 border border-indigo-500/50 p-8 rounded-[2.5rem] relative overflow-hidden">
                                    <Icon name="home" size={100} className="absolute right-[-20px] bottom-[-20px] opacity-10" />
                                    <h4 className="text-[10px] font-black text-white/50 uppercase mb-4 tracking-widest">Rampa a tu Casa Propia</h4>
                                    <div className="h-2 bg-white/10 rounded-full overflow-hidden mb-2">
                                        <div className="h-full bg-white shadow-[0_0_15px_white]" style={{ width: '12%' }}></div>
                                    </div>
                                    <p className="text-[10px] font-bold text-indigo-100 uppercase">Progreso Crediticio: 12%</p>
                                </div>
                            </div>
                            <button onClick={() => setOverlay(null)} className="w-full bg-emerald-500 text-slate-900 py-5 rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-2xl">Confirmar Blindaje</button>
                        </div>
                    )}
                </div>
            );

            // Veredicto IA (Admin)
            const AIVerdict = () => (
                <div className="p-8 space-y-10 animate-fade-in">
                    <div className="bg-slate-900 p-10 rounded-[3rem] text-center text-white relative overflow-hidden shadow-2xl">
                        <Icon name="zap" size={48} className="text-indigo-400 mx-auto mb-4" />
                        <h3 className="text-3xl font-black uppercase tracking-tighter leading-none">Apto con Seguro</h3>
                        <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mt-2 opacity-80">Legajo Verificado por IA</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-50 p-6 rounded-[2rem] border text-center">
                            <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Score</p>
                            <p className="text-2xl font-black text-indigo-600">890</p>
                        </div>
                        <div className="bg-slate-50 p-6 rounded-[2rem] border text-center">
                            <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Solvencia</p>
                            <p className="text-2xl font-black text-slate-800">3.2x</p>
                        </div>
                    </div>

                    <div className="bg-emerald-50 p-8 rounded-[2.5rem] border border-emerald-100 text-center">
                        <h4 className="text-lg font-black text-emerald-900 uppercase tracking-tight mb-2">Oportunidad de Venta</h4>
                        <p className="text-xs text-emerald-700 font-medium leading-relaxed mb-8">El inquilino no posee aval físico. Ofrece la **Garantía Blindato** para cerrar hoy mismo. <br/> <strong>+$15.000 Markup Gestor</strong></p>
                        <button onClick={() => setOverlay('signature')} className="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-emerald-500/20">VENDER GARANTÍA</button>
                    </div>

                    <div className="flex gap-4">
                        <button className="flex-1 bg-slate-900 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Aprobar Legajo</button>
                        <button className="flex-1 bg-white border border-slate-100 text-slate-300 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Rechazar</button>
                    </div>
                </div>
            );

            // Firma Digital
            const SignatureWorkflow = () => (
                <div className="p-8 space-y-12 animate-fade-in">
                    <header className="text-center">
                        <h2 className="text-2xl font-black text-slate-800">Cierre de Contrato</h2>
                        <p className="text-xs text-slate-400 font-bold uppercase mt-1">ID: #CTR-99021-X</p>
                    </header>

                    <div className="relative">
                        <div className="absolute left-[26px] top-6 bottom-6 w-[2px] bg-slate-100"></div>
                        <div className="space-y-12 relative">
                            {[
                                { role: "Garantes", name: "Carlos Pérez", status: "ok" },
                                { role: "Inquilino", name: "Marcos Galperin", status: "pending" },
                                { role: "Administrador", name: "Inmobiliaria", status: "wait" },
                                { role: "Propietario", name: "Roberto Daer", status: "wait" }
                            ].map((s, i) => (
                                <div key={i} className="flex items-center gap-6">
                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center z-10 ${s.status === 'ok' ? 'bg-emerald-500 text-white' : s.status === 'pending' ? 'bg-indigo-600 text-white animate-pulse shadow-lg shadow-indigo-200' : 'bg-white text-slate-300 border'}`}>
                                        <Icon name={s.status === 'ok' ? 'check' : 'user'} size={24} />
                                    </div>
                                    <div>
                                        <p className="text-[9px] font-black uppercase text-slate-400">{s.role}</p>
                                        <p className={`font-bold text-sm ${s.status === 'wait' ? 'text-slate-200' : 'text-slate-800'}`}>{s.status === 'wait' ? 'Esperando turno...' : s.name}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <button onClick={() => setOverlay(null)} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xs uppercase tracking-widest shadow-2xl flex items-center justify-center gap-3">
                        <Icon name="fingerprint" /> FIRMAR CON BIOMETRÍA
                    </button>
                </div>
            );

            // Bitácora de Estado
            const PropertyBitacora = () => (
                <div className="p-6 space-y-8 animate-fade-in">
                    <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                        <div className="relative aspect-video rounded-3xl overflow-hidden bg-slate-200 shadow-lg">
                            <img src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=400" className="w-full h-full object-cover" />
                            <div className="absolute top-4 left-4 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-black text-white uppercase flex items-center gap-1">
                                <Icon name="clock" size={10} /> 10/03/2026 - CHECK-IN
                            </div>
                        </div>
                        <div>
                            <h4 className="font-black text-slate-800 text-lg">Cocina - Grifería</h4>
                            <p className="text-xs text-slate-500 font-medium italic">"Estado impecable. Sin goteos ni manchas previas."</p>
                        </div>
                        <div className="flex items-center gap-2 text-emerald-600 text-[10px] font-black uppercase tracking-widest border-t pt-4">
                            <Icon name="shield-check" size={16}/> SELLO INMUTABLE INFOEXPERTO
                        </div>
                    </div>
                    
                    <div className="bg-slate-50 p-10 rounded-[2.5rem] border border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-300 gap-4">
                        <Icon name="plus-circle" size={40} />
                        <span className="text-[10px] font-black uppercase tracking-[0.2em]">Agregar Punto de Control</span>
                    </div>

                    <button className="w-full bg-slate-900 text-white py-5 rounded-[2.5rem] font-black text-[10px] uppercase tracking-widest shadow-2xl">Descargar Acta de Entrega</button>
                </div>
            );

            // Pago de Alquiler
            const PaymentFlow = () => (
                <div className="p-8 space-y-10 animate-fade-in">
                    <div className="bg-slate-900 p-10 rounded-[3rem] text-center text-white relative overflow-hidden shadow-2xl">
                        <p className="text-[10px] font-black uppercase opacity-50 tracking-widest mb-4">Mes de Abril 2026</p>
                        <h2 className="text-5xl font-black tracking-tighter">$450.000</h2>
                    </div>
                    
                    <div className="space-y-4">
                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Seleccionar Origen</h4>
                        <button className="w-full p-6 bg-white border-4 border-indigo-600 rounded-[2.5rem] flex items-center justify-between shadow-xl shadow-indigo-100">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center"><Icon name="shield-check" /></div>
                                <div className="text-left">
                                    <p className="font-black text-slate-800">Usa mi Blindaje</p>
                                    <p className="text-[10px] font-bold text-indigo-600 uppercase">Disponible: $405.430</p>
                                </div>
                            </div>
                            <Icon name="check-circle" className="text-indigo-600" />
                        </button>
                        <button className="w-full p-6 bg-slate-50 border rounded-[2.5rem] flex items-center gap-4 opacity-50 grayscale">
                            <Icon name="landmark" className="text-slate-400" />
                            <div className="text-left">
                                <p className="font-black text-sm text-slate-400">Banco Galicia</p>
                                <p className="text-[10px] font-bold uppercase">Saldo: $125.000</p>
                            </div>
                        </button>
                    </div>

                    <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100 flex gap-4">
                        <Icon name="info" className="text-amber-500 shrink-0" />
                        <p className="text-[11px] text-amber-800 font-bold leading-relaxed">
                            <strong>Efecto Netflix:</strong> Al pagar con tu banco hoy, tu blindaje saltará automáticamente para cubrir el mes de Mayo.
                        </p>
                    </div>

                    <button onClick={() => setOverlay(null)} className="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-black text-sm uppercase tracking-widest shadow-2xl">Confirmar Pago</button>
                </div>
            );

            // --- RENDERIZADO CONDICIONAL ---

            if (authState === 'landing') return <Landing />;
            if (authState === 'login') return <AuthForm mode="login" />;
            if (authState === 'register') return <AuthForm mode="register" />;

            return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-200 p-4">
                    {/* Switcher de Roles Global */}
                    <div className="fixed top-6 z-[200] flex bg-white/80 backdrop-blur-md p-1.5 rounded-full shadow-2xl border border-white">
                        <button onClick={() => handleProfileSwitch('admin')} className={`px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all ${profile === 'admin' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Admin Web</button>
                        <button onClick={() => handleProfileSwitch('tenant')} className={`px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all ${profile === 'tenant' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Inquilino</button>
                        <button onClick={() => handleProfileSwitch('owner')} className={`px-6 py-2 rounded-full text-[10px] font-black uppercase transition-all ${profile === 'owner' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Dueño</button>
                    </div>

                    <div className="mobile-shell">
                        {/* Notch Mobile */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-7 bg-slate-900 rounded-b-3xl z-[150] flex items-center justify-center gap-2">
                            <div className="w-1.5 h-1.5 rounded-full bg-slate-800"></div>
                            <div className="w-10 h-1 bg-slate-800 rounded-full"></div>
                        </div>

                        {/* Perfil Seleccionado */}
                        {profile === 'admin' && <AdminView />}
                        {profile === 'tenant' && <TenantView />}
                        {profile === 'owner' && <OwnerView />}

                        {/* Overlays Dinámicos */}
                        {overlay === 'blinding_wizard' && <WizardOverlay title="Motor de Blindaje" dark onClose={() => {setOverlay(null); setStep(1);}}><BlindingWizard /></WizardOverlay>}
                        {overlay === 'ai_verdict' && <WizardOverlay title="Análisis de Riesgo IA" onClose={() => setOverlay(null)}><AIVerdict /></WizardOverlay>}
                        {overlay === 'signature' && <WizardOverlay title="Cadena de Firma" onClose={() => setOverlay(null)}><SignatureWorkflow /></WizardOverlay>}
                        {overlay === 'bitacora' && <WizardOverlay title="Bitácora Forense" onClose={() => setOverlay(null)}><PropertyBitacora /></WizardOverlay>}
                        {overlay === 'payment_flow' && <WizardOverlay title="Abonar Alquiler" onClose={() => setOverlay(null)}><PaymentFlow /></WizardOverlay>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BlindatoApp />);
    </script>
</body>
</html>
